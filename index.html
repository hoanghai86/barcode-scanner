<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barcode Scanner</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      color: #111;
    }

    header {
      padding: 10px;
      text-align: center;
      background: white;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    video {
      width: 100%;
      height: 40vh;
      object-fit: cover;
      background: black;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: white;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
    }

    button:active {
      transform: scale(0.95);
    }

    .list {
      background: white;
      margin-top: 10px;
      padding: 10px;
      height: calc(60vh - 80px);
      overflow-y: auto;
      border-top: 1px solid #eee;
    }

    .item {
      padding: 8px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>📦 Barcode Scanner</header>

  <video id="video" autoplay playsinline></video>

  <div class="controls">
    <button onclick="startScanner()">Start</button>
    <button onclick="stopScanner()">Stop</button>
    <button onclick="clearList()">Clear</button>
    <button onclick="exportExcel()">Export</button>
  </div>

  <div class="list" id="list"></div>

  <script src="app.js"></script>

</body>
</html>
