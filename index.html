<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barcode Scanner</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 🔘 buttons floating */
    .controls {
      position: fixed;
      bottom: 120px;
      right: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .controls button {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: none;
      background: #00ff88;
      color: black;
      font-size: 18px;
    }

    .controls button:active {
      transform: scale(0.9);
    }

    /* 📋 list */
    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 40%;
      background: white;
      color: black;
      border-radius: 15px 15px 0 0;
      padding: 10px;
      overflow-y: auto;
    }

    .sheet ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sheet li {
      padding: 6px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

  <!-- 📷 CAMERA FULLSCREEN -->
  <video id="video" autoplay playsinline></video>

  <!-- 🔘 BUTTONS -->
<div class="controls">
  <button onclick="startScanner()">▶</button>
  <button onclick="stopScanner()">⛔</button>
  <button onclick="clearList()">🧹</button>
  <button onclick="exportExcel()">⬇</button>
</div>

  <!-- 📋 LIST -->
  <div class="sheet">
    <h3>📦 Scanned</h3>
    <ul id="list"></ul>
  </div>

  <script src="app.js"></script>

  <div id="loading" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:50vh;
  background:#000;
  color:#00ff88;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  z-index:9999;
">
  📷 Đang mở camera...
</div>

</body>
</html>
